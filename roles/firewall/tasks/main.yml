---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Reset ufw
  community.general.ufw:
    state: reset

- name: Deny incoming by default
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Allow outgoing by default
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow required TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ allowed_tcp_ports }}"

- name: Enable ufw
  community.general.ufw:
    state: enabled
